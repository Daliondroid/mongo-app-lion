<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Mahasiswa</title>
    <link href="vendor/bootstrap/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="vendor/fontawesome-free-7.2.0-web/css/all.min.css">
    <script src="vendor/jquery/jquery-4.0.0.min.js"></script>
  </head>
  <body class="p-4">
    <div class="container">
        <h1>Mahasiswa</h1>
        <button class="btn btn-primary mb-3" data-bs-toggle="modal" data-bs-target="#mahasiswaModal" id="add"><i class="fas fa-plus"></i> Tambah</button>
        <button class="btn btn-danger mb-3" id="pdf"><i class="fas fa-file-pdf"></i> Export PDF</button>
        <button class="btn btn-success mb-3" id="excel"><i class="fas fa-file-excel"></i> Export Excel</button>
        <table class="table table-striped">
            <thead class="table-dark">
                <tr>
                    <th>NIM</th>
                    <th>Nama</th>
                    <th>Jenis Kelamin</th>
                    <th>Usia</th>
                    <th>Program Studi</th>
                    <th>Aksi</th>
                </tr>
            </thead>
            <tbody id="mahasiswa-table">
                <!-- Data mahasiswa akan ditampilkan di sini -->
            </tbody>
        </table>
    </div>

    <!-- Modal -->
    <div class="modal fade" id="mahasiswaModal" tabindex="-1" aria-labelledby="mahasiswaModalLabel" aria-hidden="true">
        <div class="modal-dialog">
            <div class="modal-content">
            <div class="modal-header">
                <h5 class="modal-title" id="mahasiswaModalLabel">Tambah Mahasiswa</h5>
                <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Close"></button>
            </div>
            <form id="mahasiswa-form">
                <input type="hidden" id="edit_id" value=""> 
                
                <div class="modal-body">
                    <div class="mb-3">
                        <label for="nim" class="form-label">NIM</label>
                        <input type="text" class="form-control" id="nim" required>
                    </div>
                    <div class="mb-3">
                        <label for="nama" class="form-label">Nama</label>
                        <input type="text" class="form-control" id="nama" required>
                    </div>
                    <div class="mb-3">
                        <label for="jenis_kelamin" class="form-label">Jenis Kelamin</label>
                        <select class="form-select" id="jenis_kelamin" required>
                        <option value="">Pilih...</option>
                        <option value="Laki-laki">Laki-laki</option>
                        <option value="Perempuan">Perempuan</option>
                        </select>
                    </div>
                    <div class="mb-3">
                        <label for="usia" class="form-label">Usia</label>
                        <input type="number" class="form-control" id="usia" required>
                    </div>
                    <div class="row mb-3">
                        <div class="col-md-4">
                            <label for="kode_prodi" class="form-label">Kode Prodi</label>
                            <input type="text" class="form-control" id="kode_prodi" required>
                        </div>
                        <div class="col-md-8">
                            <label for="nama_prodi" class="form-label">Nama Program Studi</label>
                            <input type="text" class="form-control" id="nama_prodi" required>
                        </div>
                    </div>
                </div>
                <div class="modal-footer">
                    <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Batal</button>
                    <button type="submit" class="btn btn-primary" id="save">Simpan</button>
                </div>
            </form>
            </div>
        </div>  
    </div>

    <script src="vendor/bootstrap/bootstrap.min.js"></script>
    <script src="assets/js/mahasiswa.js"></script>
  </body>
</html>
